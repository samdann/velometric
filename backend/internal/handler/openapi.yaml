openapi: 3.0.3
info:
  title: Velometric API
  description: Cycling performance analytics — upload FIT files, get deep performance insights.
  version: 1.0.0

servers:
  - url: http://localhost:8081
    description: Local development

paths:
  /health:
    get:
      summary: Health check
      tags: [System]
      responses:
        "200":
          description: OK

  /api/activities:
    get:
      summary: List activities
      tags: [Activities]
      responses:
        "200":
          description: List of activities
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Activity"
    post:
      summary: Upload a FIT file
      tags: [Activities]
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file:
                  type: string
                  format: binary
      responses:
        "201":
          description: Activity created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UploadResponse"
        "409":
          description: Duplicate activity
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api/activities/{id}:
    get:
      summary: Get activity detail
      tags: [Activities]
      parameters:
        - $ref: "#/components/parameters/ActivityId"
      responses:
        "200":
          description: Activity detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Activity"
        "404":
          description: Not found

  /api/activities/{id}/records:
    get:
      summary: Get time-series records
      tags: [Activities]
      parameters:
        - $ref: "#/components/parameters/ActivityId"
      responses:
        "200":
          description: Array of time-series data points
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ActivityRecord"

  /api/activities/{id}/elevation:
    get:
      summary: Get elevation profile
      tags: [Activities]
      parameters:
        - $ref: "#/components/parameters/ActivityId"
      responses:
        "200":
          description: Smoothed, downsampled elevation profile
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ElevationPoint"

  /api/activities/{id}/power-curve:
    get:
      summary: Get power curve (best efforts)
      tags: [Activities]
      parameters:
        - $ref: "#/components/parameters/ActivityId"
      responses:
        "200":
          description: Power curve entries
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PowerCurveEntry"

  /api/activities/{id}/laps:
    get:
      summary: Get laps
      tags: [Activities]
      parameters:
        - $ref: "#/components/parameters/ActivityId"
      responses:
        "200":
          description: Array of laps
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ActivityLap"

  /api/strava/refresh-token:
    post:
      summary: Refresh Strava access token
      description: Exchanges a long-lived refresh token for a new access token.
      tags: [Strava]
      parameters:
        - in: query
          name: refresh_token
          required: true
          schema:
            type: string
          description: Strava refresh token obtained from the initial OAuth flow.
      responses:
        "200":
          description: New token response from Strava
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StravaTokenResponse"
        "400":
          description: Missing refresh_token parameter
        "502":
          description: Strava token refresh failed

  /api/strava/status:
    get:
      summary: Get Strava integration status
      description: Returns whether a Strava access token is configured on the server.
      tags: [Strava]
      responses:
        "200":
          description: Status object
          content:
            application/json:
              schema:
                type: object
                properties:
                  configured:
                    type: boolean

  /api/strava/sync:
    post:
      summary: Start async Strava sync
      description: |
        Creates a sync job and immediately returns it (HTTP 202). The job runs in the background
        through two phases: FETCHING (pull from Strava API → cache to DB) and PROCESSING
        (match cached activities against local FIT-uploaded activities).
        Poll `GET /api/strava/jobs/{id}` to track progress.
      tags: [Strava]
      parameters:
        - name: offset
          in: query
          required: false
          schema:
            type: integer
            minimum: 0
          description: |
            Number of activities to skip from the start of Strava's result set (newest-first).
            offset=0 starts from the most recent activity. offset=10 skips the 10 most recent.
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
          description: Max number of Strava activities to fetch. Omit or set to 0 for all.
      responses:
        "202":
          description: Job created and running in background
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StravaSyncJob"
        "500":
          description: Failed to create job (e.g. token not configured)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api/strava/jobs/{id}:
    get:
      summary: Get sync job status
      description: Returns the current state of a Strava sync job, including counts and any error message.
      tags: [Strava]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Job state
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StravaSyncJob"
        "404":
          description: Job not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api/strava/jobs/{id}/retry:
    post:
      summary: Retry a failed sync job
      description: |
        Re-launches a job that is in `FETCHING_FAILED` or `PROCESSING_FAILED` state.
        If the job failed during processing, the fetch phase is skipped and cached
        `strava_activities` are reused.
      tags: [Strava]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "202":
          description: Job restarted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StravaSyncJob"
        "404":
          description: Job not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "409":
          description: Job is not in a failed state
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api/strava/jobs/{id}/reprocess:
    post:
      summary: Reprocess a sync job
      description: |
        Skips the Strava fetch phase and re-runs only the matching phase using
        already-cached `strava_activities`. Useful after fixing matching logic or
        timezone issues without re-fetching from Strava.
        Valid for jobs in `DATA_FETCHED`, `DATA_PROCESSED`, or `PROCESSING_FAILED` state.
      tags: [Strava]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "202":
          description: Reprocess started
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StravaSyncJob"
        "404":
          description: Job not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "409":
          description: Job has not completed the fetch phase yet
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api/statistics/years:
    get:
      summary: Get years with power data
      description: Returns distinct years (descending) where the user has activities with power meter data.
      tags: [Statistics]
      responses:
        "200":
          description: Array of years
          content:
            application/json:
              schema:
                type: array
                items:
                  type: integer
                example: [2025, 2024, 2023]

  /api/statistics/power:
    get:
      summary: Get annual power statistics
      description: |
        Returns the median power curve and median zone distribution across all rides
        with power data in the given year. Zone distribution requires FTP and power
        zones to be configured in Settings.
      tags: [Statistics]
      parameters:
        - name: year
          in: query
          required: true
          schema:
            type: integer
            minimum: 2000
            maximum: 2100
          description: The year to compute statistics for
          example: 2024
      responses:
        "200":
          description: Annual power statistics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AnnualPowerStats"
        "400":
          description: Missing or invalid year parameter
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api/internal/batch-import:
    post:
      summary: Start batch FIT import
      description: |
        Scans the server-side `.fit/` directory and imports all activity FIT files
        into the database. Runs asynchronously — returns a job ID immediately.
        Re-running is safe: already-imported activities are skipped and flagged as duplicates.
      tags: [Internal]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BatchImportRequest"
      responses:
        "202":
          description: Job accepted and running
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BatchImportJob"
        "503":
          description: Database unavailable

  /api/internal/batch-import/{id}:
    get:
      summary: Get batch import status / report
      tags: [Internal]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Job status and report (report is null while running)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BatchImportJob"
        "404":
          description: Job not found

components:
  parameters:
    ActivityId:
      name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid

  schemas:
    StravaTokenResponse:
      type: object
      properties:
        token_type:
          type: string
          example: Bearer
        expires_at:
          type: integer
          format: int64
          description: Unix timestamp when the access token expires
        expires_in:
          type: integer
          description: Seconds until the access token expires
        refresh_token:
          type: string
        access_token:
          type: string

    Activity:
      type: object
      properties:
        id:
          type: string
          format: uuid
        userId:
          type: string
          format: uuid
        name:
          type: string
        sport:
          type: string
        startTime:
          type: string
          format: date-time
        duration:
          type: integer
          description: seconds
        distance:
          type: number
          description: meters
        elevationGain:
          type: number
          description: meters
        avgPower:
          type: integer
          description: watts
        maxPower:
          type: integer
        normalizedPower:
          type: integer
        tss:
          type: number
        intensityFactor:
          type: number
        variabilityIndex:
          type: number
        avgHeartRate:
          type: integer
        maxHeartRate:
          type: integer
        avgCadence:
          type: integer
        maxCadence:
          type: integer
        avgSpeed:
          type: number
          description: m/s
        maxSpeed:
          type: number
        createdAt:
          type: string
          format: date-time

    ActivityRecord:
      type: object
      properties:
        activityId:
          type: string
          format: uuid
        timestamp:
          type: string
          format: date-time
        lat:
          type: number
        lon:
          type: number
        altitude:
          type: number
        distance:
          type: number
        power:
          type: integer
        heartRate:
          type: integer
        cadence:
          type: integer
        speed:
          type: number
        temperature:
          type: number

    ElevationPoint:
      type: object
      properties:
        distance:
          type: number
          description: km
        altitude:
          type: number
          description: meters

    PowerCurveEntry:
      type: object
      properties:
        durationSeconds:
          type: integer
        bestPower:
          type: integer
        avgHr:
          type: integer

    ActivityLap:
      type: object
      properties:
        lapNumber:
          type: integer
        startTime:
          type: string
          format: date-time
        duration:
          type: integer
        distance:
          type: number
        avgPower:
          type: integer
        maxPower:
          type: integer
        avgHR:
          type: integer
        maxHR:
          type: integer
        avgCadence:
          type: integer
        avgSpeed:
          type: number
        maxSpeed:
          type: number
        ascent:
          type: number
        descent:
          type: number
        trigger:
          type: string

    UploadResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        message:
          type: string

    BatchImportRequest:
      type: object
      properties:
        types:
          type: array
          items:
            type: string
            enum: [cycling, running, swimming]
          description: Sports to import. Empty array = all types.
          example: ["cycling"]
        from:
          type: string
          format: date-time
          description: Import activities on or after this time (RFC3339). Omit for no lower bound.
          example: "2023-01-01T00:00:00Z"
        to:
          type: string
          format: date-time
          description: Import activities on or before this time (RFC3339). Omit for no upper bound.
          example: "2024-12-31T23:59:59Z"

    BatchImportJob:
      type: object
      properties:
        id:
          type: string
          format: uuid
        status:
          type: string
          enum: [running, completed]
        startedAt:
          type: string
          format: date-time
        completedAt:
          type: string
          format: date-time
        progress:
          type: object
          properties:
            total:
              type: integer
            processed:
              type: integer
        report:
          type: object
          nullable: true
          properties:
            totalFiles:
              type: integer
            success:
              type: integer
            duplicates:
              type: integer
            skippedType:
              type: integer
            skippedDateRange:
              type: integer
            skippedNotActivity:
              type: integer
            errors:
              type: integer
            errorsByMessage:
              type: object
              additionalProperties:
                type: integer
            errorDetails:
              type: array
              items:
                type: object
                properties:
                  file:
                    type: string
                  error:
                    type: string
            duplicateFiles:
              type: array
              items:
                type: string
            sportBreakdown:
              type: object
              additionalProperties:
                type: integer

    StravaSyncResult:
      type: object
      properties:
        updatedCount:
          type: integer
          description: Number of local activities updated from Strava metadata
        createdCount:
          type: integer
          description: Number of Strava activities with no local match
        candidates:
          type: array
          description: Activities that are close but outside the strict matching window
          items:
            $ref: "#/components/schemas/StravaMatchCandidate"
        error:
          type: string

    StravaSyncJob:
      type: object
      properties:
        id:
          type: string
          format: uuid
        userId:
          type: string
          format: uuid
        status:
          type: string
          enum:
            - PENDING
            - FETCHING
            - DATA_FETCHED
            - FETCHING_FAILED
            - PROCESSING
            - DATA_PROCESSED
            - PROCESSING_FAILED
        limitCount:
          type: integer
          description: Max activities to fetch (0 = all)
        offsetCount:
          type: integer
          description: Number of activities skipped from the start of Strava's result set
        fetchedCount:
          type: integer
          description: Number of activities fetched from Strava (set after FETCHING phase)
        updatedCount:
          type: integer
          description: Number of local activities updated (set after PROCESSING phase)
        createdCount:
          type: integer
          description: Number of unmatched Strava activities (set after PROCESSING phase)
        errorMessage:
          type: string
          description: Present when job is in a failed state
        startedAt:
          type: string
          format: date-time
        fetchedAt:
          type: string
          format: date-time
        completedAt:
          type: string
          format: date-time
        createdAt:
          type: string
          format: date-time

    StravaMatchCandidate:
      type: object
      properties:
        stravaId:
          type: integer
          format: int64
        stravaTitle:
          type: string
        localId:
          type: string
          format: uuid
        localTitle:
          type: string
        timeDiffSecs:
          type: integer
          description: Absolute difference in start time between the two activities (seconds)
        distanceDiffPct:
          type: number
          description: Relative distance difference as a fraction (0.05 = 5%)

    AnnualPowerStats:
      type: object
      properties:
        powerCurve:
          type: array
          items:
            $ref: "#/components/schemas/AnnualPowerCurvePoint"
        zoneDistribution:
          type: array
          items:
            $ref: "#/components/schemas/AnnualZoneDistributionPoint"

    AnnualPowerCurvePoint:
      type: object
      properties:
        durationSeconds:
          type: integer
          description: Duration in seconds (5, 15, 30, 60, 300, 600, 1200, 1800, 2700, 3600)
        medianPower:
          type: integer
          description: Median best power across all rides in the year (watts)

    AnnualZoneDistributionPoint:
      type: object
      properties:
        zoneNumber:
          type: integer
        name:
          type: string
        color:
          type: string
        minWatts:
          type: integer
        maxWatts:
          type: integer
          nullable: true
        medianPercentage:
          type: number
          description: Median % of ride time spent in this zone across all rides in the year

    Error:
      type: object
      properties:
        error:
          type: string
