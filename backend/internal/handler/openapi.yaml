openapi: 3.0.3
info:
  title: Velometric API
  description: Cycling performance analytics — upload FIT files, get deep performance insights.
  version: 1.0.0

servers:
  - url: http://localhost:8081
    description: Local development

paths:
  /health:
    get:
      summary: Health check
      tags: [System]
      responses:
        "200":
          description: OK

  /api/activities:
    get:
      summary: List activities
      tags: [Activities]
      responses:
        "200":
          description: List of activities
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Activity"
    post:
      summary: Upload a FIT file
      tags: [Activities]
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file:
                  type: string
                  format: binary
      responses:
        "201":
          description: Activity created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UploadResponse"
        "409":
          description: Duplicate activity
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api/activities/{id}:
    get:
      summary: Get activity detail
      tags: [Activities]
      parameters:
        - $ref: "#/components/parameters/ActivityId"
      responses:
        "200":
          description: Activity detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Activity"
        "404":
          description: Not found

  /api/activities/{id}/records:
    get:
      summary: Get time-series records
      tags: [Activities]
      parameters:
        - $ref: "#/components/parameters/ActivityId"
      responses:
        "200":
          description: Array of time-series data points
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ActivityRecord"

  /api/activities/{id}/elevation:
    get:
      summary: Get elevation profile
      tags: [Activities]
      parameters:
        - $ref: "#/components/parameters/ActivityId"
      responses:
        "200":
          description: Smoothed, downsampled elevation profile
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ElevationPoint"

  /api/activities/{id}/power-curve:
    get:
      summary: Get power curve (best efforts)
      tags: [Activities]
      parameters:
        - $ref: "#/components/parameters/ActivityId"
      responses:
        "200":
          description: Power curve entries
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PowerCurveEntry"

  /api/activities/{id}/laps:
    get:
      summary: Get laps
      tags: [Activities]
      parameters:
        - $ref: "#/components/parameters/ActivityId"
      responses:
        "200":
          description: Array of laps
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ActivityLap"

  /api/internal/batch-import:
    post:
      summary: Start batch FIT import
      description: |
        Scans the server-side `.fit/` directory and imports all activity FIT files
        into the database. Runs asynchronously — returns a job ID immediately.
        Re-running is safe: already-imported activities are skipped and flagged as duplicates.
      tags: [Internal]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BatchImportRequest"
      responses:
        "202":
          description: Job accepted and running
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BatchImportJob"
        "503":
          description: Database unavailable

  /api/internal/batch-import/{id}:
    get:
      summary: Get batch import status / report
      tags: [Internal]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Job status and report (report is null while running)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BatchImportJob"
        "404":
          description: Job not found

components:
  parameters:
    ActivityId:
      name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid

  schemas:
    Activity:
      type: object
      properties:
        id:
          type: string
          format: uuid
        userId:
          type: string
          format: uuid
        name:
          type: string
        sport:
          type: string
        startTime:
          type: string
          format: date-time
        duration:
          type: integer
          description: seconds
        distance:
          type: number
          description: meters
        elevationGain:
          type: number
          description: meters
        avgPower:
          type: integer
          description: watts
        maxPower:
          type: integer
        normalizedPower:
          type: integer
        tss:
          type: number
        intensityFactor:
          type: number
        variabilityIndex:
          type: number
        avgHeartRate:
          type: integer
        maxHeartRate:
          type: integer
        avgCadence:
          type: integer
        maxCadence:
          type: integer
        avgSpeed:
          type: number
          description: m/s
        maxSpeed:
          type: number
        createdAt:
          type: string
          format: date-time

    ActivityRecord:
      type: object
      properties:
        activityId:
          type: string
          format: uuid
        timestamp:
          type: string
          format: date-time
        lat:
          type: number
        lon:
          type: number
        altitude:
          type: number
        distance:
          type: number
        power:
          type: integer
        heartRate:
          type: integer
        cadence:
          type: integer
        speed:
          type: number
        temperature:
          type: number

    ElevationPoint:
      type: object
      properties:
        distance:
          type: number
          description: km
        altitude:
          type: number
          description: meters

    PowerCurveEntry:
      type: object
      properties:
        durationSeconds:
          type: integer
        bestPower:
          type: integer
        avgHr:
          type: integer

    ActivityLap:
      type: object
      properties:
        lapNumber:
          type: integer
        startTime:
          type: string
          format: date-time
        duration:
          type: integer
        distance:
          type: number
        avgPower:
          type: integer
        maxPower:
          type: integer
        avgHR:
          type: integer
        maxHR:
          type: integer
        avgCadence:
          type: integer
        avgSpeed:
          type: number
        maxSpeed:
          type: number
        ascent:
          type: number
        descent:
          type: number
        trigger:
          type: string

    UploadResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        message:
          type: string

    BatchImportRequest:
      type: object
      properties:
        types:
          type: array
          items:
            type: string
            enum: [cycling, running, swimming]
          description: Sports to import. Empty array = all types.
          example: ["cycling"]
        from:
          type: string
          format: date-time
          description: Import activities on or after this time (RFC3339). Omit for no lower bound.
          example: "2023-01-01T00:00:00Z"
        to:
          type: string
          format: date-time
          description: Import activities on or before this time (RFC3339). Omit for no upper bound.
          example: "2024-12-31T23:59:59Z"

    BatchImportJob:
      type: object
      properties:
        id:
          type: string
          format: uuid
        status:
          type: string
          enum: [running, completed]
        startedAt:
          type: string
          format: date-time
        completedAt:
          type: string
          format: date-time
        progress:
          type: object
          properties:
            total:
              type: integer
            processed:
              type: integer
        report:
          type: object
          nullable: true
          properties:
            totalFiles:
              type: integer
            success:
              type: integer
            duplicates:
              type: integer
            skippedType:
              type: integer
            skippedDateRange:
              type: integer
            skippedNotActivity:
              type: integer
            errors:
              type: integer
            errorsByMessage:
              type: object
              additionalProperties:
                type: integer
            errorDetails:
              type: array
              items:
                type: object
                properties:
                  file:
                    type: string
                  error:
                    type: string
            duplicateFiles:
              type: array
              items:
                type: string
            sportBreakdown:
              type: object
              additionalProperties:
                type: integer

    Error:
      type: object
      properties:
        error:
          type: string
